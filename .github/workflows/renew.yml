name: Katabump Auto Renew

on:
  schedule:
    - cron: '45 22 * * *'
  workflow_dispatch:

permissions:
  contents: write        

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 🧠 检查时间间隔 (不满 3 天则跳过)
      id: check
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "👋 手动触发，强制执行脚本。"
          echo "run_script=true" >> $GITHUB_ENV
          exit 0
        fi
        
        if [ -f katabump_success.txt ]; then
          LAST_RUN=$(cat katabump_success.txt)
          NOW=$(date +%s)
          DIFF=$(( (NOW - LAST_RUN) / 86400 ))
          if [ $DIFF -lt 3 ]; then
            echo "⏳ 距离上次成功不足 3 天，今天已经执行过了，继续休眠！"
            echo "run_script=false" >> $GITHUB_ENV
            exit 0
          fi
        fi
        
        echo "✅ 达到执行间隔或无记录，即将启动续期..."
        echo "run_script=true" >> $GITHUB_ENV

    - name: Setup Node.js
      if: env.run_script == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Dependencies
      if: env.run_script == 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install-deps chrome
      
    - name: ⚙️ 启动中转代理并执行续期 (进程合并)
      if: env.run_script == 'true'
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        REMOTE_PROXY: ${{ secrets.PROXY_URL }}
        PROXY_URL: http://127.0.0.1:8080
      run: |
        if [ -z "$REMOTE_PROXY" ]; then
          echo "❌ 致命错误: PROXY_URL 远端节点未读取到，请检查 Secrets！"
          exit 1
        fi

        echo "🔧 正在启动本地代理转换中枢..."
        curl -sL https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz | gzip -d > gost
        chmod +x gost
        
        ./gost -L http://127.0.0.1:8080 -F "$REMOTE_PROXY" > gost.log 2>&1 &
        
        sleep 3
        if ! pgrep -x "gost" > /dev/null; then
          echo "❌ Gost 启动闪退！底层日志如下："
          cat gost.log
          exit 1
        fi
        echo "✅ Gost 本地中转服务已在 8080 端口稳定运行。"
        
        xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js | tee run_log.txt
        
        if grep -q "Renew successful" run_log.txt; then
          echo "🎉 检测到真实的续期成功标志！"
          echo "REAL_SUCCESS=true" >> $GITHUB_ENV
        else
          echo "ℹ️ 本次运行未发生真实续期（可能还没到时间，或发生错误）。"
          echo "REAL_SUCCESS=false" >> $GITHUB_ENV
        fi

    - name: 💾 记录真实成功时间并推送至仓库
      if: success() && env.run_script == 'true' && env.REAL_SUCCESS == 'true'
      run: |
        date +%s > katabump_success.txt
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add katabump_success.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 记录 KataBump 真实续期时间 [skip ci]" && git push)
        echo "🎉 真正的续期时间点已存档！接下来 3 天将自动休眠。"

    - name: Upload Screenshots
      if: always() && env.run_script == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/
