name: Katabump Auto Renew

on:
  schedule:
    - cron: '45 22 * * *'
  workflow_dispatch:

permissions:
  contents: write        

jobs:
  renew:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v5
    
    - name: 🧠 检查时间间隔 (不满 3 天则跳过)
      id: check
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "👋 手动触发，强制执行脚本。"
          echo "run_script=true" >> $GITHUB_ENV
          exit 0
        fi
        
        if [ -f katabump_success.txt ]; then
          LAST_RUN=$(cat katabump_success.txt)
          NOW=$(date +%s)
          DIFF=$(( (NOW - LAST_RUN) / 86400 ))
          if [ $DIFF -lt 3 ]; then
            echo "⏳ 距离上次成功不足 3 天，今天已经执行过了，继续休眠！"
            echo "run_script=false" >> $GITHUB_ENV
            exit 0
          fi
        fi
        
        echo "✅ 达到执行间隔或无记录，即将启动续期..."
        echo "run_script=true" >> $GITHUB_ENV

    - name: Setup Node.js
      if: env.run_script == 'true'
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        
    - name: Install Dependencies
      if: env.run_script == 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install-deps chrome
      
    - name: Run Renew Script and Analyze Log
      if: env.run_script == 'true'
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        # 1. 运行 JS 脚本，并使用 tee 命令把输出日志同时保存到 run_log.txt 文件中
        xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js | tee run_log.txt
        
        # 2. 检查日志中是否包含真正的成功标志
        if grep -q "Renew successful" run_log.txt; then
          echo "🎉 检测到真实的续期成功标志！"
          echo "REAL_SUCCESS=true" >> $GITHUB_ENV
        else
          echo "ℹ️ 本次运行未发生真实续期（可能还没到时间，或发生错误）。"
          echo "REAL_SUCCESS=false" >> $GITHUB_ENV
        fi

    - name: 💾 记录真实成功时间并推送至仓库
      # ⚠️ 核心修复：必须同时满足运行了、没报错、且日志里确认了“真实成功”
      if: success() && env.run_script == 'true' && env.REAL_SUCCESS == 'true'
      run: |
        date +%s > katabump_success.txt
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add katabump_success.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 记录 KataBump 真实续期时间 [skip ci]" && git push)
        echo "🎉 真正的续期时间点已存档！接下来 3 天将自动休眠。"

    - name: Upload Screenshots
      if: always() && env.run_script == 'true'
      uses: actions/upload-artifact@v5
      with:
        name: screenshots
        path: screenshots/
